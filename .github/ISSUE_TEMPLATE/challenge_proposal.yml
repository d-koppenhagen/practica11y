name: 🧩 New challenge proposal
description: Suggest a new accessibility challenge for Practica11y.
title: '[Challenge]: '
labels:
  - challenge
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping grow Practica11y! Describe the accessibility
        challenge you'd like to see. The more detail you provide, the easier it
        is to turn your idea into a playable challenge.
  - type: input
    id: working_title
    attributes:
      label: Working title
      description: A short, catchy name — puns are very welcome.
      placeholder: e.g. Div and Conquer
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Accessibility problem
      description: >-
        Which accessibility barrier should this challenge teach? What is broken
        in the (imagined) starter code?
    validations:
      required: true
  - type: textarea
    id: learning_objective
    attributes:
      label: Learning objective
      description: What should the user learn or fix in order to solve it?
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      description: How hard should this challenge be?
      options:
        - beginner
        - intermediate
        - advanced
    validations:
      required: false
  - type: input
    id: wcag
    attributes:
      label: Related WCAG success criterion
      placeholder: e.g. 1.1.1 Non-text Content (Level A)
    validations:
      required: false
  - type: textarea
    id: starter_code
    attributes:
      label: Starter code (broken)
      description: >-
        Provide the initial HTML/CSS/JS that contains the accessibility problem.
        Use fenced code blocks (```html, ```css, ```js).
      placeholder: |
        ```html
        <!-- The broken code the user starts with -->
        ```
    validations:
      required: false
  - type: textarea
    id: solution_code
    attributes:
      label: Solution code (fixed)
      description: >-
        Provide a reference solution that resolves the accessibility issue.
        Use fenced code blocks (```html, ```css, ```js).
      placeholder: |
        ```html
        <!-- The corrected, accessible version -->
        ```
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to ARIA APG patterns, MDN, Deque University, WCAG, etc.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a similar proposal.
          required: true
