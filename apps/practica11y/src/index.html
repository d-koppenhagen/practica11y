<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>practica11y</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="assets/light.png" />
  </head>
  <body>
    <app-root></app-root>
    <script>
      // GitHub Pages SPA support: restore path after 404.html redirect
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          if (redirect !== '/') {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
  </body>
</html>
