<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary meta tags -->

      name="keywords"
      content="web accessibility, a11y, WCAG, WCAG 2.2, accessibility challenges, learn accessibility, inclusive design, ARIA, screen reader, keyboard navigation, frontend"
    />
    <meta name="author" content="Danny Koppenhagen" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b2b2b" />
    <link rel="canonical" href="https://practica11y.dev/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Practica11y" />
    <meta property="og:url" content="https://practica11y.dev/" />

      property="og:title"
      content="Practica11y — Learn web accessibility by doing"

      content="A free, gamified platform with interactive, browser-based challenges that turn WCAG 2.2 guidelines into hands-on practice for developers."
    />

      property="og:image"
      content="https://practica11y.dev/assets/og-image.png"
    />
    <meta
      property="og:image:secure_url"
      content="https://practica11y.dev/assets/og-image.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Practica11y — learn web accessibility by doing. Gamified, browser-based WCAG 2.2 challenges."
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X / Bluesky Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Practica11y — Learn web accessibility by doing"
    />

      name="twitter:description"
      content="A free, gamified platform with interactive, browser-based challenges that turn WCAG 2.2 guidelines into hands-on practice for developers."
    />

    <link rel="icon" type="image/x-icon" href="assets/light.png" />
    <link rel="apple-touch-icon" href="assets/light.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Practica11y",
        "alternateName": "practica11y.dev",
        "url": "https://practica11y.dev/",
        "description": "A free, gamified learning platform for web accessibility with interactive, browser-based challenges based on WCAG 2.2.",
        "inLanguage": "en",
        "author": {
          "@type": "Person",
          "name": "Danny Koppenhagen",
          "url": "https://k9n.dev"
        }
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
    <script>
      // GitHub Pages SPA support: restore path after 404.html redirect
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          if (redirect !== '/') {
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
  </body>
</html>
