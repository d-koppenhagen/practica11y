<section class="contact-form" aria-label="Contact form">
  <h2>Contact Us</h2>
  <form>
    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Jane Doe">
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="jane@example.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" rows="4" placeholder="Write your message here..."></textarea>
    </div>
    <div class="form-actions">
      <button type="submit" aria-label="Submit form data to server">Send</button>
      <button type="reset" aria-label="Clear all input fields">Reset</button>
    </div>
  </form>
</section>

<nav class="site-nav" aria-label="Main navigation">
  <ul>
    <li><a href="/home" aria-label="Navigate to homepage">Home</a></li>
    <li><a href="/about" aria-label="Learn more about our company">About</a></li>
    <li><a href="/contact" aria-label="Get in touch with our team">Contact</a></li>
  </ul>
</nav>
