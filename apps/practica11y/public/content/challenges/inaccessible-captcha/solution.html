<form class="login-form">
  <h1>Log In</h1>

  <label for="username">Username</label>
  <input type="text" id="username" name="username" autocomplete="username">

  <label for="password">Password</label>
  <input type="password" id="password" name="password" autocomplete="current-password">

  <div class="captcha">
    <p>To verify you are human, please paste this code into the field below:</p>
    <output class="verification-code" aria-label="Verification code to copy">X7k-9Qm</output>
    <label for="captcha">Paste code here</label>
    <input type="text" id="captcha" name="captcha" autocomplete="off">
  </div>

  <button type="submit">Log In</button>
</form>
