<div class="settings">
  <div class="setting-row">
    <label id="label-darkmode" class="setting-label">Dark mode</label>
    <button role="switch" aria-checked="false" aria-labelledby="label-darkmode" class="toggle">
      <span class="toggle-thumb"></span>
    </button>
  </div>
  <div class="setting-row">
    <label id="label-email" class="setting-label">Email notifications</label>
    <button role="switch" aria-checked="true" aria-labelledby="label-email" class="toggle on">
      <span class="toggle-thumb"></span>
    </button>
  </div>
  <div class="setting-row">
    <label id="label-autosave" class="setting-label">Auto-save</label>
    <button role="switch" aria-checked="false" aria-labelledby="label-autosave" class="toggle">
      <span class="toggle-thumb"></span>
    </button>
  </div>
</div>
