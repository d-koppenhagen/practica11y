<main>
  <h1>Search Flights</h1>
  <form>
    <div class="form-row">
      <input type="text" placeholder="From (e.g. Berlin)" />
      <input type="text" placeholder="To (e.g. Munich)" />
    </div>
    <div class="form-row">
      <input type="date" placeholder="Departure date" />
      <input type="number" placeholder="Passengers" min="1" max="9" />
    </div>
    <button type="submit">Search</button>
  </form>
</main>
