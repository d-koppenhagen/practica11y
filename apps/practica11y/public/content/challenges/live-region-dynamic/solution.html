<main>
  <h1>Notifications</h1>
  <p>
    Click the button below to add a notification. Notice that screen readers
    don't announce it.
  </p>

  <button id="add-notification">Show Notification</button>

  <div id="notification-area"></div>

  <div
    id="live-announcer"
    aria-live="polite"
    aria-atomic="true"
    class="sr-only"
  ></div>
</main>
