<form class="checkout-form">
  <h2>Checkout</h2>

  <fieldset>
    <legend>Personal Information</legend>

    <label for="fname">First name</label>
    <input type="text" id="fname" name="fname" autocomplete="given-name">

    <label for="lname">Last name</label>
    <input type="text" id="lname" name="lname" autocomplete="family-name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email">
  </fieldset>

  <fieldset>
    <legend>Shipping Address</legend>

    <label for="street">Street address</label>
    <input type="text" id="street" name="street" autocomplete="street-address">

    <label for="city">City</label>
    <input type="text" id="city" name="city" autocomplete="address-level2">

    <label for="zip">Postal code</label>
    <input type="text" id="zip" name="zip" autocomplete="postal-code">

    <label for="country">Country</label>
    <input type="text" id="country" name="country" autocomplete="country-name">
  </fieldset>

  <fieldset>
    <legend>Payment</legend>

    <label for="ccnum">Credit card number</label>
    <input type="text" id="ccnum" name="ccnum" autocomplete="cc-number">

    <label for="ccexp">Expiration date</label>
    <input type="text" id="ccexp" name="ccexp" placeholder="MM/YY" autocomplete="cc-exp">
  </fieldset>

  <button type="submit">Place order</button>
</form>
