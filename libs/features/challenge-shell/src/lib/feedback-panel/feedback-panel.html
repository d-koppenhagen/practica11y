@switch (state()) {
  @case ('button') {
    <a11y-empty-action (actionClick)="onCheckSolution()">
      <svg
        icon
        aria-hidden="true"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10" />
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      Check Solution
    </a11y-empty-action>
  }
  @case ('loading') {
    <div role="status" aria-live="polite" class="feedback-loading">
      <span class="shell-spinner"></span>
      <span>Analyzing…</span>
    </div>
  }
  @case ('results') {
    <div aria-live="polite" aria-atomic="true" class="feedback-results">
      <a11y-challenge-feedback [result]="analysisResult()" />
    </div>
  }
}
