<div class="dialog-content">
  <header class="dialog-header">
    <h2 id="device-flow-dialog-title">Sign in with GitHub</h2>
    <button
      type="button"
      class="close-button"
      aria-label="Close dialog"
      (click)="cancel()"
    >
      <svg
        aria-hidden="true"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </header>

  <div class="dialog-body">
    <p class="instructions">
      Enter the following code on GitHub to authorize this device:
    </p>

    <div class="user-code-container">
      <code class="user-code" aria-label="Device authorization code">
        {{ data.userCode }}
      </code>
    </div>

    <div class="actions">
      <button
        type="button"
        class="copy-button"
        (click)="copyCode()"
        [attr.aria-label]="
          copySuccess() ? 'Code copied' : 'Copy code to clipboard'
        "
      >
        @if (copySuccess()) {
          <svg
            aria-hidden="true"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Copied!
        } @else {
          <svg
            aria-hidden="true"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          Copy code
        }
      </button>

      <a
        class="verification-link"
        [href]="data.verificationUri"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open GitHub verification page
        <svg
          aria-hidden="true"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
          <polyline points="15 3 21 3 21 9" />
          <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
      </a>
    </div>

    <div class="status" aria-live="polite" aria-atomic="true">
      @if (data.errorMessage) {
        <p class="status-error">{{ data.errorMessage }}</p>
      } @else if (data.isPolling) {
        <p class="status-polling">
          <span class="spinner" aria-hidden="true"></span>
          Waiting for authorization&hellip;
        </p>
      }
    </div>
  </div>

  <footer class="dialog-footer">
    <button type="button" class="cancel-button" (click)="cancel()">
      Cancel
    </button>
  </footer>
</div>
