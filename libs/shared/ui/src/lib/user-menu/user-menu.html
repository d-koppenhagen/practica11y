@if (!authStore.isAuthenticated()) {
  <button type="button" class="sign-in-button" (click)="signIn()">
    <svg
      aria-hidden="true"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
      />
    </svg>
    Sign in
  </button>
} @else {
  <div class="user-menu-container">
    <button type="button" class="avatar-button" ngMenuTrigger [menu]="userMenu">
      <img
        class="avatar"
        [src]="authStore.user()?.avatarUrl"
        [alt]="'Avatar of ' + authStore.user()?.login"
        width="28"
        height="28"
      />
      <span class="username">{{ authStore.user()?.login }}</span>
    </button>

    <div
      ngMenu
      #userMenu="ngMenu"
      class="dropdown"
      (itemSelected)="handleItemSelected($event)"
    >
      <div class="sync-status">
        @switch (syncStore.state()) {
          @case ('syncing') {
            <span class="sync-indicator syncing" aria-hidden="true">
              <span class="sync-spinner"></span>
            </span>
            <span class="sync-label">Syncing&hellip;</span>
          }
          @case ('success') {
            <span class="sync-indicator success" aria-hidden="true">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </span>
            <span class="sync-label">Synced</span>
          }
          @case ('error') {
            <span class="sync-indicator error" aria-hidden="true">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
              </svg>
            </span>
            <span class="sync-label sync-error-text">{{
              syncStore.lastError()
            }}</span>
          }
          @default {
            <span class="sync-indicator idle" aria-hidden="true">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 4 23 10 17 10" />
                <polyline points="1 20 1 14 7 14" />
                <path
                  d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
                />
              </svg>
            </span>
            <span class="sync-label">Idle</span>
          }
        }
      </div>

      <hr class="divider" />

      <button ngMenuItem value="sync" class="menu-item">
        <svg
          aria-hidden="true"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path
            d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
          />
        </svg>
        Sync now
      </button>

      <button ngMenuItem value="logout" class="menu-item">
        <svg
          aria-hidden="true"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Sign out
      </button>
    </div>

    <span aria-live="polite" aria-atomic="true" class="visually-hidden">
      {{ syncStateAnnouncement() }}
    </span>
  </div>
}
